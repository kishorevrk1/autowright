apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: openclaw
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: openclaw
spec:
  selector:
    app: temporal
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: NodePort
